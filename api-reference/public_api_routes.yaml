# Authoritative declaration of the public API surface.
#
# This file is the single source of truth for which routes are public. It
# replaces the old "docs.json navigation minus a PUBLIC_OPENAPI_EXCLUDED_ROUTES
# deny-list" arrangement with an explicit allow-list (whitelist).
#
# How it is used:
#   * generate_openapi.py filters the live FastAPI spec down to exactly the
#     entries under `sdk_routes`. Anything not listed here is stripped from
#     openapi.json and therefore never reaches the generated SDKs/CLI.
#   * unit_tests/test_generate_openapi_filter.py asserts the docs stay in sync:
#     every documented api-reference page (the `openapi:` frontmatter routes
#     reachable from docs.json navigation) must be classified here as either an
#     `sdk_routes` entry or a `documentation_only_routes` entry, and vice versa.
#
# Each entry is a single "METHOD /v1/path" string. Paths use the OpenAPI
# templated form (e.g. `{classification_id}`) and must match the FastAPI route.
#
# To add a public route: add it under `sdk_routes`, document it with an
# api-reference page wired into docs.json, then regenerate openapi.json and the
# SDKs. To document a route for humans without shipping an SDK method for it,
# add it under `documentation_only_routes` instead.

# Routes published to openapi.json and the generated SDKs/CLI.
sdk_routes:
